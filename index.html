<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ice Hockey - Mobile Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            color: white;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #1a2a6c 0%, #1a2a6c 50%, #b21f1f 50%, #b21f1f 100%);
            overflow: hidden;
        }

        .ice-rink {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90vw;
            height: 80vh;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
        }

        .center-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background: rgba(255, 255, 255, 0.5);
            transform: translateX(-50%);
        }

        .goal-left, .goal-right {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 30vh;
            background: rgba(255, 255, 255, 0.8);
        }

        .goal-left {
            left: 5px;
        }

        .goal-right {
            right: 5px;
        }

        .player {
            position: absolute;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff0000, #ff4500);
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.7);
            cursor: pointer;
            touch-action: none;
        }

        .player.blue {
            background: linear-gradient(135deg, #0066ff, #00bfff);
            box-shadow: 0 0 10px rgba(0, 102, 255, 0.7);
        }

        .puck {
            position: absolute;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #000;
            box-shadow: 0 0 15px rgba(255, 255, 0, 0.8);
            cursor: pointer;
            touch-action: none;
        }

        .score {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            z-index: 100;
        }

        .player-controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.2s;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .game-over h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px gold;
        }

        .game-over p {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        .restart-btn {
            padding: 15px 30px;
            background: gold;
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .restart-btn:hover {
            background: #ffd700;
            transform: scale(1.05);
        }

        .timer {
            position: absolute;
            top: 60px;
            width: 100%;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            z-index: 100;
        }

        .instructions {
            position: absolute;
            bottom: 90px;
            width: 90%;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 0.9rem;
            z-index: 100;
        }

        @media (max-width: 768px) {
            .player {
                width: 20px;
                height: 20px;
            }

            .puck {
                width: 12px;
                height: 12px;
            }

            .control-btn {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="ice-rink">
            <div class="center-line"></div>
            <div class="goal-left"></div>
            <div class="goal-right"></div>
            
            <div class="score">
                <span id="score-red">0</span>
                <span>:</span>
                <span id="score-blue">0</span>
            </div>
            
            <div class="player" id="player-red" style="left: 20vw; bottom: 40vh;"></div>
            <div class="player blue" id="player-blue" style="right: 20vw; bottom: 40vh;"></div>
            <div class="puck" id="puck"></div>
            
            <div class="player-controls">
                <div class="control-btn" id="up-red">↑</div>
                <div class="control-btn" id="down-red">↓</div>
            </div>
            
            <div class="player-controls" style="top: 20px;">
                <div class="control-btn" id="up-blue">↑</div>
                <div class="control-btn" id="down-blue">↓</div>
            </div>
            
            <div class="instructions">
                Primeiro a 5 golos ganha! Jogador Vermelho (esquerda) vs Azul (direita)
            </div>
        </div>
        
        <div class="game-over" id="game-over">
            <h2 id="game-over-title">FIM DE JOGO</h2>
            <p id="game-over-result"></p>
            <button class="restart-btn" id="restart-btn">JOGAR NOVAMENTE</button>
        </div>
    </div>

    <script>
        // Game state
        const gameState = {
            scoreRed: 0,
            scoreBlue: 0,
            gameActive: true,
            puckSpeed: 2,
            puckDirection: { x: (Math.random() > 0.5 ? 1 : -1), y: (Math.random() > 0.5 ? 1 : -1) }
        };

        // DOM elements
        const playerRed = document.getElementById('player-red');
        const playerBlue = document.getElementById('player-blue');
        const puck = document.getElementById('puck');
        const scoreRed = document.getElementById('score-red');
        const scoreBlue = document.getElementById('score-blue');
        const timer = document.getElementById('timer');
        const gameOver = document.getElementById('game-over');
        const gameOverTitle = document.getElementById('game-over-title');
        const gameOverResult = document.getElementById('game-over-result');
        const restartBtn = document.getElementById('restart-btn');

        // Control buttons
        const upRed = document.getElementById('up-red');
        const downRed = document.getElementById('down-red');
        const upBlue = document.getElementById('up-blue');
        const downBlue = document.getElementById('down-blue');

        // Player positions
        let playerRedY = 40;
        let playerBlueY = 40;

        // Puck position and velocity
        let puckX = 50;
        let puckY = 50;
        let puckVx = 0;
        let puckVy = 0;

        // Initialize game
        function initGame() {
            gameState.scoreRed = 0;
            gameState.scoreBlue = 0;
            gameState.gameActive = true;
            gameState.puckSpeed = 2;
            
            playerRedY = 40;
            playerBlueY = 40;
            puckX = 50;
            puckY = 50;
            puckVx = 0;
            puckVy = 0;
            
            updateScore();
            gameOver.style.display = 'none';
            
            // Random initial puck direction
            gameState.puckDirection = {
                x: (Math.random() > 0.5 ? 1 : -1),
                y: (Math.random() > 0.5 ? 1 : -1)
            };
        }

        // Update score display
        function updateScore() {
            scoreRed.textContent = gameState.scoreRed;
            scoreBlue.textContent = gameState.scoreBlue;
            
            // Check win condition
            if (gameState.scoreRed >= 5 || gameState.scoreBlue >= 5) {
                setTimeout(endGame, 500);
            }
        }

        // Update timer
        // Game loop
        function gameLoop() {
            if (!gameState.gameActive) return;

            // Update puck position
            puckX += puckVx * gameState.puckSpeed;
            puckY += puckVy * gameState.puckSpeed;

            // Boundary collision
            if (puckX <= 5) puckX = 5;
            if (puckX >= 95) puckX = 95;
            if (puckY <= 5) puckY = 5;
            if (puckY >= 95) puckY = 95;

            // Check goal (left)
            if (puckX <= 5 && puckY >= 35 && puckY <= 65) {
                gameState.scoreBlue++;
                updateScore();
                resetPuck();
                checkWinCondition();
            }

            // Check goal (right)
            if (puckX >= 95 && puckY >= 35 && puckY <= 65) {
                gameState.scoreRed++;
                updateScore();
                resetPuck();
                checkWinCondition();
            }

            // Player-puck collision
            const puckRect = puck.getBoundingClientRect();
            const redRect = playerRed.getBoundingClientRect();
            const blueRect = playerBlue.getBoundingClientRect();

            // Red player collision
            if (checkCollision(redRect, puckRect)) {
                const angle = Math.atan2(puckY - playerRedY, puckX - 20);
                puckVx = Math.cos(angle) * 3;
                puckVy = Math.sin(angle) * 3;
            }

            // Blue player collision
            if (checkCollision(blueRect, puckRect)) {
                const angle = Math.atan2(puckY - playerBlueY, puckX - 80);
                puckVx = Math.cos(angle) * 3;
                puckVy = Math.sin(angle) * 3;
            }

            // Update positions
            playerRed.style.bottom = `${playerRedY}vh`;
            playerBlue.style.bottom = `${playerBlueY}vh`;
            puck.style.left = `${puckX}vw`;
            puck.style.bottom = `${puckY}vh`;

            requestAnimationFrame(gameLoop);
        }

        // Check collision between two elements
        function checkCollision(rect1, rect2) {
            return !(
                rect1.right < rect2.left ||
                rect1.left > rect2.right ||
                rect1.bottom < rect2.top ||
                rect1.top > rect2.bottom
            );
        }

        // Reset puck to center
        function resetPuck() {
            puckX = 50;
            puckY = 50;
            puckVx = 0;
            puckVy = 0;
            
            // Small random direction
            gameState.puckDirection = {
                x: (Math.random() > 0.5 ? 1 : -1) * (0.5 + Math.random() * 0.5),
                y: (Math.random() > 0.5 ? 1 : -1) * (0.5 + Math.random() * 0.5)
            };
        }

        // Check win condition
        function checkWinCondition() {
            if (gameState.scoreRed >= 5 || gameState.scoreBlue >= 5) {
                endGame();
            }
        }

        // End game
        function endGame() {
            gameState.gameActive = false;
            
            if (gameState.scoreRed > gameState.scoreBlue) {
                gameOverTitle.textContent = 'VERMELHO VENCE!';
                gameOverResult.textContent = `Vermelho: ${gameState.scoreRed} - Azul: ${gameState.scoreBlue}`;
            } else if (gameState.scoreBlue > gameState.scoreRed) {
                gameOverTitle.textContent = 'AZUL VENCE!';
                gameOverResult.textContent = `Azul: ${gameState.scoreBlue} - Vermelho: ${gameState.scoreRed}`;
            } else {
                gameOverTitle.textContent = 'EMPATE!';
                gameOverResult.textContent = `${gameState.scoreRed} - ${gameState.scoreBlue}`;
            }
            
            gameOver.style.display = 'flex';
        }

        // Player controls
        upRed.addEventListener('touchstart', (e) => {
            e.preventDefault();
            playerRedY = Math.min(80, playerRedY + 5);
        });

        downRed.addEventListener('touchstart', (e) => {
            e.preventDefault();
            playerRedY = Math.max(10, playerRedY - 5);
        });

        upBlue.addEventListener('touchstart', (e) => {
            e.preventDefault();
            playerBlueY = Math.min(80, playerBlueY + 5);
        });

        downBlue.addEventListener('touchstart', (e) => {
            e.preventDefault();
            playerBlueY = Math.max(10, playerBlueY - 5);
        });

        // Mouse controls for desktop
        upRed.addEventListener('mousedown', () => {
            playerRedY = Math.min(80, playerRedY + 5);
        });

        downRed.addEventListener('mousedown', () => {
            playerRedY = Math.max(10, playerRedY - 5);
        });

        upBlue.addEventListener('mousedown', () => {
            playerBlueY = Math.min(80, playerBlueY + 5);
        });

        downBlue.addEventListener('mousedown', () => {
            playerBlueY = Math.max(10, playerBlueY - 5);
        });

        // Release controls
        document.addEventListener('mouseup', () => {
            // Reset to prevent continuous movement
        });

        // Restart game
        restartBtn.addEventListener('click', () => {
            initGame();
            requestAnimationFrame(gameLoop);
        });

        // Start game
        initGame();
        gameLoop();
    </script>
</body>
</html>
